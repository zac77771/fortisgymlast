<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerija | Fortis Gym</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html"><img src="slike/logo.png" alt="Fortis Gym Logo"></a>
        </div>
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <span></span><span></span><span></span>
        </label>
        <nav>
            <a href="index.html">Početna</a>
            <a href="clanarine.html">Članarine</a>
            <a href="usluge.html">Usluge</a>
            <a href="galerija.html" style="color: var(--primary-color);">Galerija</a>
            <a href="kontakt.html">Kontakt</a>
        </nav>
    </header>

    <main class="container">
        <h1 class="text-center mb-40">NAŠ <span class="orange">PROSTOR</span></h1>

        <div class="gallery-grid">
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija1.jpg" alt="Moderna recepcija i ulazni prostor Fortis Gym teretane">
                <div class="gallery-overlay">
                    <p>Recepcija</p>
                </div>
            </div>
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija2.jpg" alt="Ulaz">
                <div class="gallery-overlay">
                    <p>Ulaz</p>
                </div>
            </div>
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija3.jpg" alt="Cardio zona s profesionalnim trakama za trčanje i biciklima">
                <div class="gallery-overlay">
                    <p>Cardio zona</p>
                </div>
            </div>
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija4.jpg" alt="Prostrana glavna dvorana za vježbanje">
                <div class="gallery-overlay">
                    <p>Glavna dvorana</p>
                </div>
            </div>
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija5.jpg" alt="Zona sa slobodnim utezima, bučicama i spravama">
                <div class="gallery-overlay">
                    <p>Zona slobodnih utega</p>
                </div>
            </div>
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija6.jpg" alt="Dvorana za grupne treninge">
                <div class="gallery-overlay">
                    <p>Dvorana</p>
                </div>
            </div>
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija7.jpg" alt="Toalet">
                <div class="gallery-overlay">
                    <p>Toalet</p>
                </div>
            </div>
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija8.jpg" alt="Ormarići">
                <div class="gallery-overlay">
                    <p>Ormarići</p>
                </div>
            </div>
            <div class="gallery-item shadow-3d">
                <img src="slike/galerija9.jpg" alt="Utezi">
                <div class="gallery-overlay">
                    <p>Utezi</p>
                </div>
            </div>
        </div>
    </main>

<footer>
    <div class="footer-content">
        <p>&copy; 2024 Fortis Gym. Sva prava pridržana.</p>

        <div class="social-links">
            <a href="https://www.instagram.com/tvoj_profil" target="_blank" class="social-icon insta">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.facebook.com/tvoj_profil" target="_blank" class="social-icon fb">
                <i class="fab fa-facebook-f"></i>
            </a>
        </div>
    </div>
</footer>

</body>

</html>
